services:
  backend:
    build:
      context: .
      target: backend
    env_file: .env
    environment:
      - VOCAB_QC_DATABASE_URL_SYNC=postgresql://vocab:${DB_PASSWORD:?请设置 DB_PASSWORD 环境变量}@db:5432/vocab_qc
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "
        alembic upgrade head &&
        gunicorn -w 4 -k uvicorn.workers.UvicornWorker vocab_qc.api.main:app --bind 0.0.0.0:8000
      "
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - internal
      - external
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vocab_qc
      POSTGRES_USER: vocab
      POSTGRES_PASSWORD: ${DB_PASSWORD:?请设置 DB_PASSWORD 环境变量}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vocab -d vocab_qc"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"

volumes:
  pgdata:

networks:
  internal:
    internal: true
  external:
