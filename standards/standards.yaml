# 质检标准定义
# 生产和审核看同一份标准

meaning:
  valid_pos_tags:
    - "n."
    - "v."
    - "adj."
    - "adv."
    - "prep."
    - "conj."
    - "pron."
    - "num."
    - "art."
    - "int."
  rules:
    M3: { description: "词性标签格式", layer: 1, pass_rate: 100 }
    M4: { description: "词性换行分隔", layer: 1, pass_rate: 100 }
    M5: { description: "义项分号分隔", layer: 1, pass_rate: 100 }
    M6: { description: "禁止括号", layer: 1, pass_rate: 100 }
    M7: { description: "词义-词性匹配", layer: 2, pass_rate: 100 }

phonetic:
  rules:
    P1: { description: "IPA 格式校验", layer: 1, pass_rate: 100 }
    P2: { description: "音标-音节对齐", layer: 1, pass_rate: 100 }

syllable:
  vowel_digraphs: ["ai", "ay", "ea", "ee", "ey", "ie", "oa", "oe", "oo", "ou", "ow", "ue", "ui"]
  consonant_digraphs: ["ch", "ck", "gh", "gn", "kn", "ng", "ph", "qu", "sc", "sh", "th", "wh", "wr"]
  r_vowels: ["ar", "er", "ir", "or", "ur"]
  rules:
    S1: { description: "元音锚点校验", layer: 1, pass_rate: 100 }
    S2: { description: "音节分隔符", layer: 1, pass_rate: 100 }
    S3: { description: "原子单位完整性", layer: 1, pass_rate: 100 }
    S4: { description: "单音节不切分", layer: 1, pass_rate: 100 }

chunk:
  min_words: 2
  max_words: 5
  rules:
    C1: { description: "语块含目标词", layer: 1, pass_rate: 100 }
    C2: { description: "语块长度", layer: 1, pass_rate: 100 }
    C3: { description: "搭配合理性", layer: 2, pass_rate: 90 }
    C4: { description: "禁止括号", layer: 1, pass_rate: 100 }
    C5: { description: "中文独立成行", layer: 1, pass_rate: 100 }

sentence:
  min_words: 5
  max_words: 20
  allowed_conjunctions: ["and", "but", "so", "because"]
  allowed_relative_pronouns: ["that", "which", "who"]
  max_clause_words: 5
  rules:
    E1: { description: "语法难度", layer: 2, pass_rate: 95 }
    E2: { description: "主干结构", layer: 2, pass_rate: 90 }
    E3: { description: "连接词限制", layer: 2, pass_rate: 95 }
    E4: { description: "从句限制", layer: 2, pass_rate: 100 }
    E5: { description: "禁区检测", layer: 2, pass_rate: 100 }
    E6: { description: "例句含目标词", layer: 1, pass_rate: 100 }
    E7: { description: "例句长度", layer: 1, pass_rate: 100 }
    E8: { description: "中文翻译非空+语义对应", layer: [1, 2], pass_rate: 100 }
    E9: { description: "义项匹配", layer: 2, pass_rate: 100 }
    E10: { description: "语言地道性", layer: 2, pass_rate: 100 }
    E11: { description: "内容安全性", layer: 2, pass_rate: 100 }

mnemonic:
  valid_types:
    - "词根词缀"
    - "词中词"
    - "音义联想"
    - "考试应用"
  required_parts: 4
  max_formula_chars: 15
  max_formula_chars_exam: 30
  teacher_script_target: 500
  teacher_script_tolerance: 0.2  # ±20%
  rules:
    N1: { description: "助记类型", layer: 1, pass_rate: 100 }
    N2: { description: "结构完整性", layer: 1, pass_rate: 100 }
    N3: { description: "公式符号", layer: 1, pass_rate: 100 }
    N4: { description: "口诀字数", layer: 1, pass_rate: 100 }
    N5: { description: "话术字数+完整性", layer: [1, 2], pass_rate: 90 }
    N6: { description: "逻辑合理性", layer: 2, pass_rate: 85 }
